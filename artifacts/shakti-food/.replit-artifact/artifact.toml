kind = "web"
previewPath = "/"
title = "Shakti Fast Food"
version = "1.0.0"
id = "artifacts/shakti-food"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19895

[services.development]
run = "pnpm --filter @workspace/shakti-food run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shakti-food", "run", "build" ]
publicDir = "artifacts/shakti-food/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19895"
BASE_PATH = "/"
